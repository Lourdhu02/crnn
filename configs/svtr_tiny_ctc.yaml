base: configs/base.yaml

experiment_name: svtr_tiny_ctc

model:
  tps:
    enable: false
    num_fiducial: 20

  backbone:
    name: svtr_tiny
    pretrained: false
    out_channels: 192

  sequence:
    hidden_size: 192
    num_layers: 0
    dropout: 0.0

  head:
    num_classes: 12

optimizer:
  name: Adam
  lr: 0.0003
  weight_decay: 0.0001

scheduler:
  name: CosineAnnealingLR
  T_max: 50
  eta_min: 0.00001

train:
  data_dir: data/train
  label_file: data/train_labels.txt
  batch_size: 96
  epochs: 150
  warmup_epochs: 5
  grad_clip: 3.0

eval:
  data_dir: data/val
  label_file: data/val_labels.txt
  beam_size: 3

test:
  data_dir: data/test
  label_file: data/test_labels.txt
