base: configs/base.yaml

experiment_name: svtr_tiny_ctc

model:
  tps:
    enable: false
    num_fiducial: 20
  backbone:
    name: svtr_tiny
    pretrained: false
    out_channels: 192
  sequence:
    hidden_size: 192
    num_layers: 0
    dropout: 0.0
  head:
    num_classes: 12
  label_smoothing: 0.1

optimizer:
  name: Adam
  lr: 0.0003
  weight_decay: 0.0001

scheduler:
  name: CosineAnnealingLR
  T_max: 150
  eta_min: 0.00001

train:
  data_dir: datav2/train
  label_file: datav2/train_labels.txt
  batch_size: 16
  epochs: 2
  warmup_epochs: 5
  grad_clip: 1.0

eval:
  data_dir: datav2/val
  label_file: datav2/val_labels.txt
  beam_size: 3

test:
  data_dir: datav2/test
  label_file: datav2/test_labels.txt
