base: configs/base.yaml

experiment_name: crnn_mobilenet_ctc

charset: "0123456789."
blank_index: 0
img_height: 32
img_width: 128
img_channel: 1
max_seq_len: 12

model:
  tps:
    enable: true
    num_fiducial: 20
  backbone:
    name: mobilenet_v3_small
    pretrained: true
    out_channels: 512
  sequence:
    hidden_size: 256
    num_layers: 2
    dropout: 0.1
  head:
    num_classes: 12

optimizer:
  name: Adam
  lr: 0.0003
  weight_decay: 0.0001

scheduler:
  name: CosineAnnealingLR
  T_max: 50
  eta_min: 0.00001

train:
  data_dir: datav2/train
  label_file: datav2/train_labels.txt
  batch_size: 16
  num_workers: 0
  epochs: 10
  warmup_epochs: 2
  grad_clip: 5.0
  save_dir: checkpoints
  log_interval: 10
  eval_interval: 1

eval:
  data_dir: datav2/val
  label_file: datav2/val_labels.txt
  batch_size: 16
  num_workers: 0
  beam_size: 0

test:
  data_dir: datav2/test
  label_file: datav2/test_labels.txt

wandb:
  project: null
  entity: null
  log_images: false
  log_image_interval: 500
