charset: "0123456789."
blank_index: 0

img_height: 32
img_width: 128
img_channel: 1
max_seq_len: 12

optimizer:
  name: Adam
  lr: 0.0003
  weight_decay: 0.0001

scheduler:
  name: CosineAnnealingLR
  T_max: 100
  eta_min: 0.00001

train:
  batch_size: 128
  num_workers: 2
  epochs: 100
  warmup_epochs: 5
  grad_clip: 3.0
  save_dir: outputs/checkpoints
  log_interval: 50
  eval_interval: 1

eval:
  batch_size: 128
  num_workers: 2
  beam_size: 3
